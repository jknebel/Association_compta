name: Deploy to Production

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  BACKEND_SERVICE_NAME: assocompta-backend
  REPO_NAME: assocompta-backend

jobs:
  # 1. CHANGE DETECTION
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
              - 'src/**'
              - '*.json'
              - '*.html'

  # 2. TEST & LINT (Optional)
  test:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

  # 3. BUILD & DEPLOY BACKEND (Cloud Run)
  deploy-backend:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    outputs:
      backend_url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      # Authenticate to Google Cloud
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Configure Docker (Only if backend changed)
      - name: 'Docker Auth'
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |-
          gcloud auth configure-docker europe-west1-docker.pkg.dev

      # Build the Container (Only if backend changed)
      - name: 'Build Container'
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |-
          docker build -t europe-west1-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$BACKEND_SERVICE_NAME:${{ github.sha }} ./backend

      # Push the Container (Only if backend changed)
      - name: 'Push Container'
        if: ${{ needs.changes.outputs.backend == 'true' }}
        run: |-
          docker push europe-west1-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$BACKEND_SERVICE_NAME:${{ github.sha }}

      # Deploy to Cloud Run (Only if backend changed)
      - id: 'deploy'
        name: 'Deploy to Cloud Run'
        if: ${{ needs.changes.outputs.backend == 'true' }}
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.BACKEND_SERVICE_NAME }}'
          image: 'europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }}'
          region: '${{ env.REGION }}'
          flags: '--allow-unauthenticated'
          env_vars: |
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}

      # ALWAYS GET URL (Even if we didn't deploy, we need the URL for frontend)
      - id: 'get-url'
        name: 'Get Service URL'
        run: |
          if [ "${{ steps.deploy.outputs.url }}" != "" ]; then
             echo "url=${{ steps.deploy.outputs.url }}" >> $GITHUB_OUTPUT
          else
             # Fetch existing URL if we didn't deploy
             EXISTING_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
             echo "url=$EXISTING_URL" >> $GITHUB_OUTPUT
          fi

  # 4. BUILD & DEPLOY FRONTEND (Firebase Hosting)
  deploy-frontend:
    needs: [changes, deploy-backend]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      # Build with environment variables
      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          VITE_API_URL: ${{ needs.deploy-backend.outputs.backend_url }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }} 

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.GCP_SA_KEY }}'
          channelId: live
          projectId: '${{ secrets.GCP_PROJECT_ID }}'
